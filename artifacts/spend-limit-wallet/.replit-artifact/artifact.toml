kind = "web"
previewPath = "/"
title = "Spend Limit Wallet"
version = "1.0.0"
id = "artifacts/spend-limit-wallet"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19677

[services.development]
run = "pnpm --filter @workspace/spend-limit-wallet run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spend-limit-wallet", "run", "build" ]
publicDir = "artifacts/spend-limit-wallet/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19677"
BASE_PATH = "/"
